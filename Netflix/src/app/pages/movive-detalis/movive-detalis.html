<div class="w-100 my-4 px-3 px-md-5">
  <div class="movie-card bg-dark text-white rounded-4 shadow-lg p-4 row g-4 align-items-start w-100 min-vh-60">

    <!-- Image -->
    <div class="col-md-4">
      <img
        [src]="'/assets/images/' + movie.imageUrl"
        class="img-fluid rounded-3 w-100 shadow movie-img"
        alt="{{ movie.title }}"
        style="object-fit: cover; height: 100%; max-height: 500px;"
      />
    </div>

    <!-- Info -->
    <div class="col-md-8 d-flex flex-column justify-content-between">

      <!-- Title & Description -->
      <div>
        <h1 class="display-4 fw-bold mb-3">{{ movie.title }}</h1>
        <div class="text-muted mb-2">
          <span>{{ movie.categoryName }}</span> |
          <span>{{ movie.duration }} mins</span>
        </div>
        <p class="lead text-light mb-4">{{ movie.description }}</p>
      </div>

      <!-- Buttons -->
      <div class="d-flex flex-wrap gap-3 mb-4">
        <button class="btn btn-outline-light px-4 py-2" (click)="switchTab('details')">📄 Details</button>
        <button class="btn btn-outline-light px-4 py-2" (click)="switchTab('trailer')">🎬 Trailer</button>
        <button class="btn btn-outline-light px-4 py-2" (click)="switchTab('movie')">▶️ Watch</button>
      </div>

      <!-- Rating -->
      <div>
        <span class="fs-3 text-warning">⭐️⭐️⭐️⭐️⭐️</span>
      </div>
    </div>
  </div>

  <!-- Trailer or Movie Section -->
  <div class="mt-4 px-md-5">
    <!-- Trailer -->
    <div *ngIf="activeTab === 'trailer' && showTrailer">
      <iframe
        class="w-100 rounded-4 shadow"
        style="height: 450px;"
        [src]="safeTrailerUrl"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

    <!-- Movie Video -->
    <div *ngIf="activeTab === 'movie' && !showTrailer">
      <video class="w-100 rounded-4 shadow" style="height: 450px;" controls>
        <source [src]="'/assets/videos/' + movie.videoUrl" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>
  </div>
</div>
