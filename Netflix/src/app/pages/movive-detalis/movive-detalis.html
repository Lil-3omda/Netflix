<app-navbar></app-navbar>

<div class="movie-details-container" *ngIf="movie; else loading">

  <!-- Poster -->
  <div class="poster-wrapper">
    <img [src]="'/assets/images/' + movie.imageUrl" alt="{{ movie.title }}" />
  </div>

  <!-- Info -->
  <div class="info-wrapper">
    <h1 class="movie-title">{{ movie.title }}</h1>
    <p class="category">{{ movie.categoryName }} | {{ movie.duration }} mins</p>
    <p class="description">{{ movie.description }}</p>
    <p class="views">👁️ {{ movie.totalView || 0 }} views</p>

    <!-- Rating -->
    <div class="rating">
      <span *ngFor="let star of [1,2,3,4,5]">⭐</span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button [class.active]="activeTab === 'details'" (click)="switchTab('details')">📄 Details</button>
      <button [class.active]="activeTab === 'trailer'" (click)="switchTab('trailer')">🎬 Trailer</button>
      <button [class.active]="activeTab === 'movie'" (click)="switchTab('movie')">▶️ Watch Movie</button>
    </div>

    <!-- Tab Content -->

    <!-- 1. Details -->
    <div *ngIf="activeTab === 'details'">
      <p><strong>Status:</strong> {{ movie.status }}</p>
      <p><strong>Type:</strong> {{ movie.type === '0' ? 'Movie' : 'Series' }}</p>
      <p><strong>Duration:</strong> {{ movie.duration }} minutes</p>
    </div>

    <!-- 2. Trailer -->
    <div *ngIf="activeTab === 'trailer' && showTrailer">
      <iframe
        class="trailer-frame"
        [src]="safeTrailerUrl"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

    <!-- 3. Movie -->
    <div *ngIf="activeTab === 'movie' && !showTrailer">
      <video
        class="video-player"
        src="https://vgfdprgqzkwvoxsnfdlr.supabase.co/storage/v1/object/public/pickup/instructor/42/video/.mp4/311792bc-49d0-48d1-a2bc-23cf3b3b3127.mp4"
        controls
        
        ></video>
    </div>


  </div>
</div>

<!-- Loading -->
<ng-template #loading>
  <div class="text-center py-5 loading-spinner">
    <div class="spinner-border text-danger" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</ng-template>
