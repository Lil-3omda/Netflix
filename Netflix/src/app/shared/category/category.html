<app-navbar></app-navbar>

<div class="container py-5 text-white mt-5">
  <h2 class="mb-4">{{ categoryName }}</h2>

  <div class="row">
    <div class="col-6 col-md-3 mb-4" *ngFor="let movie of movies">
      <div class="movie-card" [routerLink]="['/moviedetails', movie.id]" class="text-decoration-none">
        <img [src]="'/assets/images/' + movie.imageUrl" alt="{{ movie.title }}" />
        <div class="movie-info">
          <h5>{{ movie.title }}</h5>
          <p>{{ movie.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
