<div class="animate-fade-in">
  <h3 class="text-white fw-bold mb-4">Notification Settings</h3>

  <div class="card bg-secondary border-0 p-4 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h5 class="text-white fw-medium mb-1">Email Notifications</h5>
        <p class="text-muted small mb-0">Send notifications via email</p>
      </div>
      <div class="form-check form-switch">
        <input
          class="form-check-input bg-danger border-danger custom-switch"
          type="checkbox"
          [checked]="settings.emailNotifications"
          (change)="updateSetting('emailNotifications', $event)">
      </div>
    </div>
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h5 class="text-white fw-medium mb-1">SMS Notifications</h5>
        <p class="text-muted small mb-0">Send notifications via SMS</p>
      </div>
      <div class="form-check form-switch">
        <input
          class="form-check-input bg-danger border-danger custom-switch"
          type="checkbox"
          [checked]="settings.smsNotifications"
          (change)="updateSetting('smsNotifications', $event)">
      </div>
    </div>
  </div>

  <div class="card bg-secondary border-0 p-4">
    <h5 class="text-white fw-medium mb-3">Notification Types</h5>
    <div class="d-flex justify-content-between align-items-center mb-2" *ngFor="let type of notificationTypes">
      <span class="text-muted">{{ type }}</span>
      <div class="form-check">
        <input class="form-check-input bg-danger border-danger" type="checkbox" checked>
      </div>
    </div>
  </div>
</div>
