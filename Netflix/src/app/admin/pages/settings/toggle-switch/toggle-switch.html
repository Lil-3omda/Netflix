<div class="card bg-secondary border-0 p-4">
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <h5 class="text-white fw-medium mb-1">{{ label }}</h5>
      <p class="text-muted small mb-0" *ngIf="description">{{ description }}</p>
    </div>
    <div class="form-check form-switch">
      <input
        class="form-check-input bg-danger border-danger"
        type="checkbox"
        [checked]="checked"
        (change)="onToggle($event)"
        style="transform: scale(1.2);">
    </div>
  </div>
</div>
