  <div class="collapse navbar-collapse gap-3" id="navbarNav">
    <!-- Categories - Only show when authenticated -->
    <ul class="navbar-nav" *ngIf="isAuthenticated">
      <li class="nav-item">
        <a routerLink="/Home" class="nav-link text-white">Home</a>
      </li>
      <li *ngFor="let cat of categories" class="nav-item">
        <a [routerLink]="['/category', cat]" class="nav-link text-white">
          {{ cat }}
        </a>
      </li>
    </ul>

    <!-- Right side navigation -->
    <div class="d-flex align-items-center gap-3 ms-auto">
      <!-- Authenticated user section -->
      <div *ngIf="isAuthenticated" class="d-flex align-items-center gap-3">
        <a href="#"><i class="bi bi-search fs-5 text-white cursor-pointer"></i></a>
        <span class="text-white">Kids</span>
        <i class="bi bi-bell fs-5 text-white cursor-pointer"></i>
        
        <!-- User dropdown -->
        <div class="dropdown">
          <div class="dropdown-toggle d-flex align-items-center" 
               data-bs-toggle="dropdown" 
               aria-expanded="false" 
               style="cursor: pointer;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" 
                 width="32" 
                 height="32" 
                 class="rounded" 
                 alt="avatar" />
          </div>
          <ul class="dropdown-menu dropdown-menu-end bg-dark border-dark">
            <li>
              <a class="dropdown-item text-white" href="#" (click)="navigateToProfile()">
                <i class="bi bi-person me-2"></i>Profile
              </a>
            </li>
            <li>
              <a class="dropdown-item text-white" href="#" routerLink="/account">
                <i class="bi bi-gear me-2"></i>Account
              </a>
            </li>
            <li><hr class="dropdown-divider border-secondary"></li>
            <li>
              <a class="dropdown-item text-white" href="#" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>Sign Out
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- Guest user section -->
      <div *ngIf="!isAuthenticated" class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-light btn-sm" (click)="navigateToLogin()">
          Sign In
        </button>
        <button class="btn btn-danger btn-sm" (click)="navigateToSignup()">
          Get Started
        </button>
      </div>
    </div>
  </div>
</nav>
