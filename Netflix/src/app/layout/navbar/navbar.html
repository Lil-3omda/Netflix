<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-5 fixed-top">
  <a class="navbar-brand text-danger fw-bold" routerLink="/">NETFLIX</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse gap-3" id="navbarNav">
    <!-- Left side: categories -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a routerLink="/Home" class="nav-link text-white">Home</a>
      </li>
      <li *ngFor="let cat of categories" class="nav-item">
        <a [routerLink]="['/category', cat]" class="nav-link text-white">{{ cat }}</a>
      </li>
    </ul>

    <!-- Right side -->
    <div class="d-flex align-items-center gap-2 ms-auto" >
      <!-- Search -->

  <button
  (click)="startVoiceSearch()"
  aria-label="Start voice search"
  style="
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.2s ease;
  "
  (mouseenter)="hovering = true"
  (mouseleave)="hovering = false"
  [style.transform]="hovering ? 'scale(1.2)' : 'scale(1)'"
  [style.color]="hovering ? 'red' : 'white'"

>
  <i class="fa-solid fa-microphone"></i>
</button>
  <div class="search-container ms-3" [class.active]="showSearch">

  <span (click)="toggleSearch()">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
  </span>

  <input
    type="text"
    [(ngModel)]="searchTerm"
    (input)="onSearch()"
    placeholder="Search movies..."
    class="search-input"
  />




  <!-- Dropdown results -->
  <ul *ngIf="showSearch && filteredMovies.length > 0" class="dropdown-results">
  <li *ngFor="let movie of filteredMovies" class="movie-card" (click)="goToMovie(movie.id)">
      <div class="d-flex align-items-center gap-2">
        <img [src]="'https://localhost:7140/' + movie.imageUrl" alt="{{ movie.title }}" class="movie-thumbnail" />
        <div>
          <h6 class="mb-1 fw-bold">{{ movie.title }}</h6>
          <p class="mb-0 text-muted small">{{ movie.categoryName }} • Views: {{ movie.totalView }}</p>
        </div>
      </div>
    </li>
  </ul>

  <!-- Error message -->
  <p *ngIf="showSearch && searchTerm && filteredMovies.length === 0" class="search-error">
    No results found for "{{ searchTerm }}"
  </p>
</div >
      <!-- Other items -->
      <div class="d-flex align-items-center gap-2" *ngIf="isAuthenticated">
         <!-- <span class="text-white d-none d-md-inline">Kids</span> -->
        <a routerLink="/favorite" class="nav-link me-2">
          <i class="fas fa-heart fs-5 text-white"></i>
          <span class="visually-hidden">Favorites</span>
        </a>
      <!-- Profile dropdown -->
      <div class="dropdown">
        <div class="dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;" (click)="navigateToProfile()">
          <img [src]="currentProfile ? getProfileImage(currentProfile.name) : 'https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png'" width="32" height="32" class="rounded" alt="avatar" />
          <span class="ms-2 d-none d-md-inline text-white" *ngIf="currentProfile">{{ currentProfile.name }}</span>
        </div>
        <ul class="dropdown-menu dropdown-menu-end bg-dark border-dark">
          <!-- Profile Selection -->
          <li *ngIf="userProfiles.length > 1" class="dropdown-header text-white-50">Switch Profile</li>
          <li *ngFor="let profile of userProfiles">
            <a class="dropdown-item text-white d-flex align-items-center" (click)="selectProfile(profile)">
              <img [src]="getProfileImage(profile.name)" width="24" height="24" class="rounded" alt="avatar" />
              {{ profile.name }}
              <i class="bi bi-check-lg ms-auto text-success" *ngIf="currentProfile?.id === profile.id"></i>
            </a>
          </li>
          <li *ngIf="userProfiles.length > 1"><hr class="dropdown-divider border-secondary"></li>

          <!-- Profile Management -->
          <li><a class="dropdown-item text-white" (click)="switchProfile()"><i class="bi bi-person-plus me-2"></i> Manage Profiles</a></li>
          <li><a class="dropdown-item text-white" routerLink="/watchHistory"><i class="bi bi-clock-history"></i> Watch History</a></li>
          <li><a class="dropdown-item text-white" routerLink="/account"><i class="bi bi-gear me-2"></i> Account</a></li>
          <li><hr class="dropdown-divider border-secondary"></li>
          <li><a class="dropdown-item text-white" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i> Sign Out</a></li>
        </ul>
      </div>

      </div>
      <!-- Guest -->
      <div *ngIf="!isAuthenticated" class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-light btn-sm" (click)="navigateToLogin()">Sign In</button>
        <button class="btn btn-danger btn-sm" (click)="navigateToSignup()">Get Started</button>
      </div>
    </div>
  </div>
</nav>
