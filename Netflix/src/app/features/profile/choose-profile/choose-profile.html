<div class="container text-center">
  <h2 class="mb-4">Who's Watching?</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="d-flex flex-wrap justify-content-center gap-4">
    <div
      class="card profile-card"
      *ngFor="let profile of profiles"
      (click)="selectProfile(profile.id)"
    >
      <img src="/assets/profile-icon.png" class="card-img-top" alt="Profile" />
      <div class="card-body">
        <h5 class="card-title">{{ profile.name }}</h5>
      </div>
    </div>
  </div>

  <div class="mt-5">
    <h4>Create New Profile</h4>
    <input type="text" [(ngModel)]="newprofileName" placeholder="Enter name" class="form-control w-50 mx-auto mb-2" />
    <button class="btn btn-primary" (click)="createProfile()">Create</button>
  </div>
</div>
