<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast.com - Internet Speed Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styles */
        .header {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .netflix-logo .logo-text {
            color: #e50914;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .language-selector {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        .privacy-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #fff;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .privacy-link:hover {
            background-color: #fff;
            color: #000;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        /* Fast.com Logo */
        .fast-logo {
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        .speed-gauge {
            width: 120px;
            height: 120px;
            position: relative;
        }

        .gauge-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
        }

        .gauge-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid transparent;
            border-top-color: #e50914;
            transform: rotate(-90deg);
            transition: transform 0.5s ease;
        }

        .gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #e50914;
            border-radius: 50%;
        }

        .fast-text h1 {
            font-size: 4rem;
            font-weight: bold;
            color: #e50914;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.1em;
        }

        /* Speed Display */
        .speed-display {
            margin-bottom: 40px;
        }

        .speed-number {
            font-size: 8rem;
            font-weight: 300;
            color: #fff;
            line-height: 1;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 8px rgba(229, 9, 20, 0.3);
        }

        .speed-number.testing {
            animation: speedPulse 1.5s infinite ease-in-out;
        }

        .speed-unit {
            font-size: 2rem;
            color: #ccc;
            font-weight: 300;
        }

        /* Test Controls */
        .test-button {
            background: linear-gradient(145deg, #e50914, #cc0000);
            border: none;
            border-radius: 50px;
            padding: 20px 40px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3);
            margin-bottom: 40px;
        }

        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.4);
        }

        .test-button:active {
            transform: translateY(0);
        }

        .test-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .button-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-icon {
            font-size: 16px;
        }

        /* Progress */
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e50914, #ff6b6b);
            border-radius: 3px;
            transition: width 0.3s ease;
            animation: progressGlow 2s infinite ease-in-out;
            width: 0%;
        }

        .progress-text {
            color: #ccc;
            font-size: 16px;
        }

        /* Results */
        .results {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid #333;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .result-item:last-of-type {
            margin-bottom: 25px;
        }

        .result-label {
            color: #ccc;
        }

        .result-value {
            font-weight: 600;
            color: #fff;
        }

        .result-value.excellent {
            color: #00ff00;
        }

        .result-value.good {
            color: #ffff00;
        }

        .result-value.fair {
            color: #ff8800;
        }

        .result-value.poor {
            color: #ff0000;
        }

        .test-again-button {
            background: transparent;
            border: 2px solid #e50914;
            border-radius: 25px;
            padding: 12px 24px;
            color: #e50914;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .test-again-button:hover {
            background-color: #e50914;
            color: #fff;
        }

        /* Info Section */
        .info-section {
            margin-top: auto;
            text-align: center;
        }

        .info-text {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
            max-width: 400px;
        }

        .powered-by {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            color: #666;
        }

        .netflix-brand {
            color: #e50914;
            font-weight: bold;
        }

        /* Footer */
        .footer {
            background-color: rgba(0, 0, 0, 0.8);
            border-top: 1px solid #333;
            padding: 20px;
        }

        .footer-content {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes speedPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes progressGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(229, 9, 20, 0.5); }
            50% { box-shadow: 0 0 20px rgba(229, 9, 20, 0.8); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .fast-text h1 {
                font-size: 3rem;
            }

            .speed-number {
                font-size: 6rem;
            }

            .speed-unit {
                font-size: 1.5rem;
            }

            .main-content {
                padding: 20px;
            }

            .results {
                padding: 20px;
            }

            .result-item {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .fast-text h1 {
                font-size: 2.5rem;
            }

            .speed-number {
                font-size: 4rem;
            }

            .test-button {
                padding: 15px 30px;
                font-size: 16px;
            }
        }

        .hidden {
            display: none;
        }

        .visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="speed-test-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="netflix-logo">
                    <span class="logo-text">NETFLIX</span>
                </div>
                <div class="header-right">
                    <select class="language-selector">
                        <option value="en">English (US)</option>
                        <option value="ar">العربية</option>
                    </select>
                    <a href="#" class="privacy-link">Privacy</a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Fast.com Logo -->
            <div class="fast-logo">
                <div class="speed-gauge">
                    <div class="gauge-bg">
                        <div class="gauge-fill" id="gaugeFill"></div>
                        <div class="gauge-center"></div>
                    </div>
                </div>
            </div>

            <div class="fast-text">
                <h1>FAST</h1>
            </div>

            <!-- Speed Display -->
            <div class="speed-display">
                <div class="speed-number" id="speedNumber">0</div>
                <div class="speed-unit">Mbps</div>
            </div>

            <!-- Test Button -->
            <div class="test-controls" id="testControls">
                <button class="test-button" onclick="startSpeedTest()">
                    <div class="button-content">
                        <span class="play-icon">▶</span>
                        <span>Start Test</span>
                    </div>
                </button>
            </div>

            <!-- Progress Indicator -->
            <div class="progress-container hidden" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text">Testing your connection speed...</p>
            </div>

            <!-- Results -->
            <div class="results" id="results">
                <div class="result-item">
                    <span class="result-label">Download Speed:</span>
                    <span class="result-value" id="finalSpeed">0 Mbps</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Your connection is:</span>
                    <span class="result-value" id="connectionQuality">Unknown</span>
                </div>
                <button class="test-again-button" onclick="resetTest()">
                    Test Again
                </button>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <p class="info-text">
                    This speed test uses Netflix servers to measure your internet download speed.
                </p>
                <div class="powered-by">
                    <span>POWERED BY</span>
                    <span class="netflix-brand">NETFLIX</span>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2024 Netflix, Inc.</p>
            </div>
        </footer>
    </div>

    <script>
        let isTesting = false;
        let testProgress = 0;
        let currentSpeed = 0;
        let finalSpeed = 0;
        let speedInterval;
        let progressInterval;

        function startSpeedTest() {
            if (isTesting) return;
            
            isTesting = true;
            testProgress = 0;
            currentSpeed = 0;
            
            // Hide test button, show progress
            document.getElementById('testControls').classList.add('hidden');
            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('results').style.display = 'none';
            
            // Add testing animation to speed number
            document.getElementById('speedNumber').classList.add('testing');
            
            simulateSpeedTest();
        }

        function simulateSpeedTest() {
            const testDuration = 8000; // 8 seconds
            const updateInterval = 100; // Update every 100ms
            const totalSteps = testDuration / updateInterval;
            let currentStep = 0;

            // Generate a random final speed between 5-100 Mbps
            const targetSpeed = Math.random() * 95 + 5;
            finalSpeed = Math.round(targetSpeed * 10) / 10;

            speedInterval = setInterval(() => {
                currentStep++;
                
                // Calculate progress
                testProgress = (currentStep / totalSteps) * 100;
                document.getElementById('progressFill').style.width = testProgress + '%';
                
                // Update gauge rotation
                const gaugeFill = document.getElementById('gaugeFill');
                const rotation = (testProgress / 100) * 270 - 90; // -90 to 180 degrees
                gaugeFill.style.transform = `rotate(${rotation}deg)`;
                
                // Simulate realistic speed progression with some fluctuation
                const progress = currentStep / totalSteps;
                const baseSpeed = finalSpeed * easeOutCubic(progress);
                const fluctuation = (Math.random() - 0.5) * 5; // Random fluctuation ±2.5 Mbps
                currentSpeed = Math.max(0, Math.round((baseSpeed + fluctuation) * 10) / 10);
                
                document.getElementById('speedNumber').textContent = currentSpeed;
                
                if (currentStep >= totalSteps) {
                    completeTest();
                }
            }, updateInterval);
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function completeTest() {
            clearInterval(speedInterval);
            currentSpeed = finalSpeed;
            isTesting = false;
            testProgress = 100;
            
            // Update final display
            document.getElementById('speedNumber').textContent = finalSpeed;
            document.getElementById('speedNumber').classList.remove('testing');
            document.getElementById('progressFill').style.width = '100%';
            
            // Hide progress, show results
            setTimeout(() => {
                document.getElementById('progressContainer').classList.add('hidden');
                showResults();
            }, 1000);
        }

        function showResults() {
            document.getElementById('finalSpeed').textContent = finalSpeed + ' Mbps';
            
            const qualityElement = document.getElementById('connectionQuality');
            let quality, qualityClass, qualityText;
            
            if (finalSpeed >= 50) {
                quality = 'excellent';
                qualityText = 'Excellent for 4K streaming';
            } else if (finalSpeed >= 25) {
                quality = 'good';
                qualityText = 'Great for HD streaming';
            } else if (finalSpeed >= 10) {
                quality = 'fair';
                qualityText = 'Good for SD streaming';
            } else {
                quality = 'poor';
                qualityText = 'May have buffering issues';
            }
            
            qualityElement.textContent = qualityText;
            qualityElement.className = 'result-value ' + quality;
            
            document.getElementById('results').style.display = 'block';
        }

        function resetTest() {
            if (speedInterval) {
                clearInterval(speedInterval);
            }
            
            isTesting = false;
            testProgress = 0;
            currentSpeed = 0;
            finalSpeed = 0;
            
            // Reset UI
            document.getElementById('speedNumber').textContent = '0';
            document.getElementById('speedNumber').classList.remove('testing');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('gaugeFill').style.transform = 'rotate(-90deg)';
            
            // Show test button, hide progress and results
            document.getElementById('testControls').classList.remove('hidden');
            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('results').style.display = 'none';
        }

        // Initialize gauge
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('gaugeFill').style.transform = 'rotate(-90deg)';
        });
    </script>
</body>
</html>
