<div class="container text-white mt-5">
  <h1 class="mb-2 fw-bold">🎬 Content Library</h1>


  <div class="row g-3 mt-3">
    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-film me-2 text-warning"></i> All Movies
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.videosCount }}</p>
        </div>
      </div>
    </div>

    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-check-circle me-2 text-success"></i> Published
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.published }}</p>
        </div>
      </div>
    </div>

    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-archive me-2 text-info"></i> Archived
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.archiveVideos }}</p>
        </div>
      </div>
    </div>

    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-eye me-2 text-danger"></i> Total Views
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.totoalViews }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="container text-white mt-5">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">

    <!-- Add Movie Button -->
   <button class="btn btn-success" routerLink="/AdminTest/movies/add">
  <i class="fas fa-plus me-1"></i> Add Movie
</button>

    <!-- Search Input -->
    <div class="flex-grow-1 mx-2">
      <input
        type="text"
        class="form-control bg-dark text-white border-secondary"
        placeholder="Search movies by title..."
        [(ngModel)]="searchTerm"
        (input)="onSearch()"

      />
    </div>

    <!-- Category Filter -->
    <div>
      <select class="form-select bg-dark text-white border-secondary" [(ngModel)]="selectedCategory"
       (change)="onCategoryChange()">
        <option value="">All Categories</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>

  <!-- Result (Optional List Placeholder) -->
  <div *ngIf="filteredMovies.length > 0" class="row g-3 mt-3">
    <div class="col-md-3" *ngFor="let item of filteredMovies | paginate: { itemsPerPage: 12, currentPage: page }">
      <div class="bg-dark rounded shadow-sm small-media-card text-center p-2">
        <img [src]="'https://localhost:7140/'+item.imageUrl" alt="Poster" class="img-fluid rounded mb-1"
        style="width: 100%; height: auto; max-height: 200px; object-fit: contain; background-color: #000;" />
        <div class="text-truncate fw-bold" style="font-size: 0.85rem;">{{ item.title }}</div>
        <div class="text-truncate" style="font-size: 0.75rem;">{{ item.categoryName }}</div>
        <div class="text-light" style="font-size: 0.75rem;">👁️ {{ item.totalView }}</div>
      </div>
    </div>
  </div>
  <div *ngIf="filteredMovies.length === 0" class="text-muted mt-3 text-center">
    No movies found.
  </div>


  <pagination-controls class="text-center" (pageChange)="page = $event"></pagination-controls>
</div>


</div>
