
  <div class="container text-white mt-5">
  <h1 class="mb-2 fw-bold">🎬 Content Library</h1>


  <div class="row g-3 mt-3">
    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics" routerLink="/admin/movies/all">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-film me-2 text-warning"></i> All Movies
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.videosCount }}</p>
        </div>
      </div>
    </div>

    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics"  routerLink="/admin/movies/published">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-check-circle me-2 text-success"></i> Published
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.published }}</p>
        </div>
      </div>
    </div>

    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics" routerLink="/admin/movies/archived">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-archive me-2 text-info"></i> Archived
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.archiveVideos }}</p>
        </div>
      </div>
    </div>

    <div class="col-sm-6 col-md-4 col-lg-3" *ngIf="MoviesStatistics">
      <div class="card bg-dark border-secondary shadow-sm p-3 h-100">
        <div class="card-body">
          <h6 class="card-title text-light">
            <i class="fas fa-eye me-2 text-danger"></i> Total Views
          </h6>
          <p class="card-text fs-3 fw-bold text-white">{{ MoviesStatistics.totoalViews }}</p>
        </div>
      </div>
    </div>
  </div>

  <router-outlet></router-outlet>
  </div>
