<div class="container text-white mt-5">


  <div class="container text-white mt-5">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">

    <!-- Add Movie Button -->
   <button class="btn btn-success" routerLink="/admin/movies/add">
  <i class="fas fa-plus me-1"></i> Add Movie
</button>

    <!-- Search Input -->
    <div class="flex-grow-1 mx-2">
      <input
        type="text"
        class="form-control bg-dark text-white border-secondary"
        placeholder="Search movies by title..."
        [(ngModel)]="searchTerm"
        (input)="onSearch()"

      />
    </div>

    <!-- Category Filter -->
    <div>
      <select class="form-select bg-dark text-white border-secondary" [(ngModel)]="selectedCategory"
       (change)="onCategoryChange()">
        <option value="">All Categories</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>

  <!-- Result (Optional List Placeholder) -->
  <div *ngIf="filteredMovies.length > 0" class="table-responsive mt-3">
  <table class="table table-dark table-hover align-middle text-center table-bordered">
    <thead class="table-active">
      <tr>
       
        <th>Title</th>
        <th>Category</th>
        <th>Views</th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let item of filteredMovies | paginate: { itemsPerPage: 12, currentPage: page }"
        [routerLink]="['/admin/moviedetails', item.id]"
        class="table-row-link"
      >
       
        <td class="fw-bold text-truncate">{{ item.title }}</td>
        <td class="text-truncate">{{ item.categoryName }}</td>
        <td>👁️ {{ item.totalView }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div *ngIf="filteredMovies.length === 0" class="text-muted mt-3 text-center">
  No movies found.
</div>



  <pagination-controls class="text-center" (pageChange)="page = $event"></pagination-controls>
</div>


</div>
