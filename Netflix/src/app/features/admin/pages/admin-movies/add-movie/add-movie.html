<div class="container mt-5">
  <h2 class="mb-4 text-center text-white">Add New Movie</h2>
  <form [formGroup]="movieForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data" class="bg-dark text-light p-4 rounded shadow">

    <div class="form-group mb-3">
      <label for="title">Title</label>
      <input type="text" formControlName="title" class="form-control" id="title" placeholder="Enter movie title">
    </div>

    <div class="form-group mb-3">
      <label for="trailerUrl">Trailer URL</label>
      <input type="text" formControlName="trailerUrl" class="form-control" id="trailerUrl" placeholder="Enter trailer URL">
    </div>

    <div class="form-group mb-3">
      <label for="categoryId">Category</label>
      <select formControlName="categoryId" class="form-control" id="categoryId">
        <option value="" disabled selected>Select a category</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>

     <div class="form-group mb-3">
      <label for="description">Description</label>
      <textarea formControlName="description" class="form-control" id="description" rows="3" placeholder="Enter description"></textarea>
    </div>

    <div class="form-group mb-3">
      <label for="videoFile">Select Video File</label>
      <input type="file" class="form-control" id="videoFile"  accept="video/*"
      (change)="onFileChange($event, 'videoFile')"
      >
    </div>

    <div class="form-group mb-3">
      <label for="imageFile">Select Image File</label>
      <input type="file" class="form-control" id="imageFile"  accept="image/*"
      (change)="onFileChange($event, 'imageFile')"
      >
    </div>
    <div *ngIf="uploading" class="uploading-overlay">
    <div class="spinner-border text-light" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="text-light mt-3">Uploading...</p>
  </div>


    <button type="submit" class="btn btn-danger w-100" [disabled]="movieForm.invalid || uploading">Upload Movie</button>
  </form>
</div>
