<app-navbar></app-navbar>

<div class="relative ">

<section
  *ngIf="!showTrailer"

  class="hero-section text-white vh-100 d-flex align-items-center"
  [ngStyle]="{
    'background-image':
      'linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url(' +
      'https://localhost:7140/' +
      top10Movies[0].coverUrl +
      ')'
  }"
>  <div class=" ms-5">
    <div class="badge bg-danger mb-2 px-3 py-1">Top 1</div>
    <div class="d-flex align-items-center gap-3 mb-2">
      <span class="text-warning fw-bold">⭐ {{rating}}</span>
      <span>{{top10Movies[0].duration}}</span>
      <span>{{top10Movies[0].categoryName}}</span>
    </div>
    <h1 class="fw-bold display-4">{{top10Movies[0].title}}</h1>
    <p class="lead">{{top10Movies[0].description}}</p>
    <div class="mt-3 d-flex gap-3">
      <button class="btn btn-danger px-4 py-2 fw-bold" (click)="goToMovie(top10Movies[0].id)">▶ Play Now</button>
      <button class="btn btn-secondary px-4 py-2 fw-bold" (click)="showTrailerNow()">▶ Show 
        Trailer Now</button>
    </div>
  </div>
</section>


<!-- TRAILER FULLSCREEN SECTION -->
<div *ngIf="showTrailer" class="trailer-fullscreen">
    <button class="btn btn-light back-btn" (click)="backToHero()">
    ⬅ Back
  </button>
<iframe
  [src]="sanitizedTrailerUrl"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>
</div>


</div>






<app-netflix-model *ngIf="isModalOpen && selectedMovie" (closeModal)="closeMovieModal()">
</app-netflix-model>









<app-movie-slider [title]="'Top 10'" [categoryName]="'Top 10'" [showRank]="true">
</app-movie-slider>




<div *ngFor="let category of data">
  <div *ngIf="category.videos.length > 0">
    <app-movie-slider [title]="'Top '+category.name+' Movies'" [categoryName]="category.name"></app-movie-slider>

  </div>

</div>
